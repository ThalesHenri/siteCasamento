{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #EAE3D8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #4A5334;
            padding: 15px 20px;
            text-align: center;
            z-index: 100;
        }

        .header h1 {
            color: #EAE3D8;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2em;
            font-weight: 400;
            margin: 0;
        }

        .header-nav {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .header-nav a {
            color: #EAE3D8;
            text-decoration: none;
            font-size: 0.9em;
            transition: opacity 0.3s;
        }

        .header-nav a:hover {
            opacity: 0.8;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            margin-top: 80px;
        }

        h2 {
            color: #4A5334;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2em;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #4A5334;
            box-shadow: 0 0 0 2px rgba(74, 83, 52, 0.1);
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #4A5334;
            color: #EAE3D8;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background-color: #3a4227;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }

        .register-link a {
            color: #4A5334;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .footer {
            background-color: #4A5334;
            color: #EAE3D8;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Ailka & Vínicius</h1>
        <nav class="header-nav">
            <a href="{% url 'home' %}">Início</a>
            <a href="{% url 'register' %}">Registrar</a>
        </nav>
    </header>

    <div class="container">
        <h2>Login</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" required placeholder="Seu usuário">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required placeholder="Sua senha">
            </div>

            <button type="submit" class="btn">Entrar</button>
        </form>

        <div class="register-link">
            Não tem conta? <a href="{% url 'register' %}">Registre-se aqui</a>
        </div>
    </div>

    <footer class="footer">
        <p>Projeto de Site de Casamento</p>
    </footer>
</body>
</html>
